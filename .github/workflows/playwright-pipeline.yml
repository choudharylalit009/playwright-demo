name: Playwright Enterprise Automation Suite

on:
  schedule:
    # Runs automatically every day at 15:32 UTC (Flexible Cron Scheduling)
    - cron: '32 15 * * *'
  workflow_dispatch:
    # Allows you to trigger the test suite manually with a button anytime

jobs:
  automation-execution:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - name: Check out project source code
        uses: actions/checkout@v4

      - name: Set up stable Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Project Dependencies
        run: npm ci

      - name: Install Secure Playwright Browser Binaries
        run: npx playwright install --with-deps chromium

      - name: Execute Playwright Automated Tests
        # Target ONLY your main requirement file to skip old failing tests
        run: npx playwright test tests/demotest.spec.ts

      - name: Archive and Publish Visual Test Reports
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: enterprise-playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Notify Team via Slack Webhook on Failure
        uses: rtCamp/action-slack-notify@v2
        if: failure()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_TITLE: "🚨 Automation Suite Regression Failure"
          SLACK_MESSAGE: "The scheduled Playwright test suite has failed on the main branch. Please review the cloud execution traces immediately."
          SLACK_COLOR: "#FF0000"