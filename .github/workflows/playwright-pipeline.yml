name: Playwright Enterprise Automation Suite
on:
  # 1. FLEXIBLE SCHEDULING: Replaces scheduler.js! 
  # This Cron syntax tells the system to run automatically every single day at 3:32 PM (15:32)
  schedule:
    - cron: '32 15 * * *' 
  
  # Allows you or your manager to click a button in your dashboard to run it instantly anytime
  workflow_dispatch:

jobs:
  automation-execution:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - name: Check out project source code
      uses: actions/checkout@v4

    - name: Set up stable Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Install Project Dependencies
      run: npm ci

    - name: Install Secure Playwright Browser Binaries
      run: npx playwright install --with-deps chromium

    # 2. RUNNING THE SUITE CONCURRENTLY
    - name: Execute Playwright Automated Tests
      run: npx playwright test

    # 3. EXTERNAL INTEGRATION REPORTING: Publishes artifacts automatically upon completion
    - name: Archive and Publish Visual Test Reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: enterprise-playwright-report
        path: playwright-report/
        retention-days: 30

    # 4. EXTERNAL INTEGRATION NOTIFICATIONS: Sends a workspace ping immediately if something breaks
    - name: Notify Team via Slack Webhook on Failure
      if: failure()
      uses: rtCamp/action-slack-notify@v2
      env:
        SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        SLACK_TITLE: '❌ Regression Test Suite Execution Failed'
        SLACK_MESSAGE: 'The automated Playwright run has detected an error. Please review the published JUnit XML/HTML artifact report.'